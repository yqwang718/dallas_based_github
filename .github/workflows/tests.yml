name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (CPU JAX)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run DCM unit tests
        run: pytest dcm/tests.py -v

      - name: Smoke test synthetic pipeline
        run: bash scripts/base/run_base_sample.sh
